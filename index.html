<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>KOSAME Gallery</title>
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;700&family=Sarabun:wght@400;600&display=swap" rel="stylesheet">

  <style>
    /* --- CORE SETTINGS --- */
    body {
      background-color: #010205; /* พื้นหลังด้านนอกสุดให้ดำมืด เพื่อเน้นกรอบมือถือ */
      font-family: 'Rajdhani', sans-serif;
    }
    .font-orbitron { font-family: 'Orbitron', sans-serif; }
    
    /* --- UTILITIES --- */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    /* --- SCI-FI SHAPES --- */
    .scifi-clip {
      clip-path: polygon(
        10px 0, 100% 0, 
        100% calc(100% - 10px), 
        calc(100% - 10px) 100%, 
        0 100%, 0 10px
      );
    }

    /* --- BACKGROUND ANIMATIONS --- */
    .bg-grid-animate {
      background-image: 
        linear-gradient(rgba(59, 130, 246, 0.1) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59, 130, 246, 0.1) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridPulse 4s ease-in-out infinite;
    }
    @keyframes gridPulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.6; }
    }

    .particles {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background-image: radial-gradient(#60a5fa 1px, transparent 1px);
      background-size: 50px 50px;
      opacity: 0.2;
      animation: particleDrift 20s linear infinite;
      pointer-events: none;
    }
    @keyframes particleDrift {
      0% { transform: translateY(0); }
      100% { transform: translateY(-50px); }
    }

    /* --- GLITCH EFFECT --- */
    .glitch-wrapper { position: relative; display: inline-block; }
    .glitch {
      position: relative;
      color: #fff;
      font-size: 3rem;
      font-weight: 900;
      letter-spacing: 4px;
      text-transform: uppercase;
      font-family: 'Orbitron', sans-serif;
    }
    .glitch::before, .glitch::after {
      content: attr(data-text);
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: #02040a;
    }
    .glitch::before {
      left: 2px; text-shadow: -2px 0 #60a5fa;
      clip: rect(44px, 450px, 56px, 0);
      animation: glitch-anim 5s infinite linear alternate-reverse;
    }
    .glitch::after {
      left: -2px; text-shadow: -2px 0 #93c5fd;
      clip: rect(44px, 450px, 56px, 0);
      animation: glitch-anim2 1s infinite linear alternate-reverse;
    }
    @keyframes glitch-anim {
      0% { clip: rect(32px, 9999px, 88px, 0); transform: skew(0.6deg); }
      90% { clip: rect(5px, 9999px, 65px, 0); transform: skew(0.8deg); }
      100% { clip: rect(76px, 9999px, 7px, 0); transform: skew(0.5deg); }
    }
    @keyframes glitch-anim2 {
      0% { clip: rect(65px, 9999px, 100px, 0); transform: skew(0.3deg); }
      100% { clip: rect(20px, 9999px, 80px, 0); transform: skew(0.1deg); }
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in { animation: fadeIn 0.4s ease-out; }
  </style>
</head>
<body class="text-slate-200">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- นำ URL Web App ของคุณมาใส่ตรงนี้ ---
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbw9I0z4kLd-O-_o44mXp3H-Bq-O_iI1J0_2/exec";

    const Icon = ({ name, size = 24, className = "" }) => {
      const icons = {
        User: <><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></>,
        Sticker: <><path d="M15.5 3H5a2 2 0 0 0-2 2v14c0 1.1.9 2 2 2h14a2 2 0 0 0 2-2V8.5L15.5 3Z"/><path d="M15 3v6h6"/></>,
        Facebook: <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/>,
        Smile: <><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" x2="9.01" y1="9" y2="9"/><line x1="15" x2="15.01" y1="9" y2="9"/></>,
        Trophy: <><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></>,
        MoreHorizontal: <><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></>,
        LayoutGrid: <><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></>,
        ArrowLeft: <><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></>,
        Plus: <><path d="M5 12h14"/><path d="M12 5v14"/></>,
        Lock: <><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></>,
        Unlock: <><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></>,
        X: <><path d="M18 6 6 18"/><path d="m6 6 12 12"/></>,
        Upload: <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></>,
        ImageIcon: <><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></>,
        ShieldAlert: <><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></>,
        Key: <><circle cx="7.5" cy="15.5" r="5.5"/><path d="m21 2-9.6 9.6"/><path d="m15.5 7.5 3 3L22 7l-3-3"/></>,
        ChevronLeft: <path d="m15 18-6-6 6-6"/>,
        ChevronRight: <path d="m9 18 6-6-6-6"/>,
        Loader: <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
      };
      return (
        <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
          {icons[name] || <circle cx="12" cy="12" r="10" />}
        </svg>
      );
    };

    const App = () => {
      const [view, setView] = useState('home'); 
      const [selectedCategory, setSelectedCategory] = useState(null);
      const [isAdmin, setIsAdmin] = useState(false);
      const [showAddModal, setShowAddModal] = useState(false);
      const [selectedImageIndex, setSelectedImageIndex] = useState(null);
      const [isLightBoxOpen, setIsLightBoxOpen] = useState(false);
      const [works, setWorks] = useState([]);
      const [loading, setLoading] = useState(true);
      const [passwordInput, setPasswordInput] = useState('');
      const [newWork, setNewWork] = useState({ title: '', category: 'chibi' });
      const [file, setFile] = useState(null);
      const [isUploading, setIsUploading] = useState(false);

      const ADMIN_PASSWORD = "1234";

      const categories = [
        { id: 'profile', label: 'Profile', icon: 'User', color: 'border-blue-500/50 text-blue-400' },
        { id: 'emote', label: 'Emote', icon: 'Sticker', color: 'border-blue-500/50 text-blue-400' },
        { id: 'fb-sticker', label: 'FB Sticker', icon: 'Facebook', color: 'border-blue-500/50 text-blue-400' },
        { id: 'chibi', label: 'Chibi', icon: 'Smile', color: 'border-blue-500/50 text-blue-400' },
        { id: 'badges', label: 'Sub Badges', icon: 'Trophy', color: 'border-blue-500/50 text-blue-400' },
        { id: 'etc', label: 'ETC.', icon: 'MoreHorizontal', color: 'border-blue-500/50 text-blue-400' },
      ];

      const fetchWorksData = async () => {
        setLoading(true);
        try {
            const response = await fetch(`${GAS_WEB_APP_URL}?action=getData`);
            const data = await response.json();
            setWorks(data || []);
        } catch (error) {
            console.error("Fetch error:", error);
            setWorks([]);
        } finally {
            setLoading(false);
        }
      };

      useEffect(() => {
        fetchWorksData();
      }, []);

      const safeWorks = Array.isArray(works) ? works : [];
      const currentDisplayWorks = selectedCategory 
        ? safeWorks.filter(work => work.category === selectedCategory.id)
        : safeWorks.slice(0, 9);

      const handleCategoryClick = (category) => {
        setSelectedCategory(category);
        setView('category');
        window.scrollTo(0, 0);
      };

      const handleBack = () => {
        setView('home');
        setSelectedCategory(null);
      };

      const handleLoginSubmit = (e) => {
        e.preventDefault();
        if (passwordInput === ADMIN_PASSWORD) {
          setIsAdmin(true); setView('home'); setPasswordInput('');
        } else {
          alert("ACCESS DENIED");
        }
      };

      const handleAddWork = async (e) => {
        e.preventDefault();
        if (!file || !newWork.title) return alert("Missing Info");
        setIsUploading(true);

        const reader = new FileReader();
        reader.onloadend = async function(e) {
            const payload = {
                action: 'uploadFile',
                base64: e.target.result.split(',')[1],
                mimeType: file.type,
                filename: file.name,
                title: newWork.title,
                category: newWork.category
            };

            try {
                const response = await fetch(GAS_WEB_APP_URL, {
                    method: "POST",
                    body: JSON.stringify(payload)
                });
                
                const res = await response.json();
                
                if(res.success) {
                    alert("UPLOAD COMPLETE");
                    fetchWorksData();
                    setShowAddModal(false); setFile(null); setNewWork({title:'', category:'chibi'});
                } else {
                    alert("Error: " + res.error);
                }
            } catch (error) {
                console.error("Upload error:", error);
                alert("Upload failed. Check console.");
            } finally {
                setIsUploading(false);
            }
        };
        reader.readAsDataURL(file);
      };

      const openLightBox = (index) => {
        setSelectedImageIndex(index);
        setIsLightBoxOpen(true);
      };
      
      const closeLightBox = () => {
        setIsLightBoxOpen(false);
        setSelectedImageIndex(null);
      };
      
      const nextImage = (e) => {
        e?.stopPropagation();
        if (currentDisplayWorks.length > 0) {
            setSelectedImageIndex((prev) => (prev + 1) % currentDisplayWorks.length);
        }
      };
      
      const prevImage = (e) => {
        e?.stopPropagation();
        if (currentDisplayWorks.length > 0) {
            setSelectedImageIndex((prev) => (prev - 1 + currentDisplayWorks.length) % currentDisplayWorks.length);
        }
      };

      useEffect(() => {
        const handleKeyDown = (e) => {
          if (!isLightBoxOpen) return;
          if (e.key === 'ArrowRight') nextImage();
          if (e.key === 'ArrowLeft') prevImage();
          if (e.key === 'Escape') closeLightBox();
        };
        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, [isLightBoxOpen, selectedImageIndex, currentDisplayWorks]);

      return (
        // ตรงนี้คือการห่อหุ้มแอปทั้งหมดไว้ในกรอบมือถือ (max-w-[430px]) และจัดให้อยู่กึ่งกลางหน้าจอ (mx-auto)
        <div className="mx-auto w-full max-w-[430px] min-h-screen bg-[#02040a] relative overflow-hidden pb-24 shadow-[0_0_50px_rgba(59,130,246,0.1)] sm:border-x sm:border-blue-900/30">
            
            {/* --- BACKGROUND EFFECTS --- เปลี่ยนจาก fixed เป็น absolute เพื่อให้อยู่ในกรอบมือถือ */}
            <div className="absolute inset-0 pointer-events-none z-0">
               <div className="sticky top-0 w-full h-screen">
                   <div className="absolute inset-0 bg-gradient-to-t from-[#02040a] via-[#050b1a] to-[#02040a]"></div>
                   <div className="absolute inset-0 bg-grid-animate"></div>
                   <div className="particles"></div>
                   <div className={`absolute top-[-20%] right-[-20%] w-[60%] h-[60%] blur-[120px] rounded-full opacity-40 transition-colors duration-700 bg-blue-600`}></div>
               </div>
            </div>

            <div className="relative z-10 w-full px-5 py-8">
                
                {/* LOGIN VIEW */}
                {view === 'login' && (
                    <div className="min-h-[60vh] flex flex-col items-center justify-center animate-fade-in">
                        <div className="p-6 border border-blue-500/50 bg-blue-900/10 scifi-clip mb-8 text-blue-400">
                          <Icon name="ShieldAlert" size={48}/>
                        </div>
                        <h2 className="text-3xl font-orbitron text-blue-400 mb-2">RESTRICTED</h2>
                        <p className="text-[10px] tracking-[0.3em] text-slate-500 mb-8">AUTHENTICATION</p>
                        
                        <form onSubmit={handleLoginSubmit} className="w-full space-y-4">
                            <div className="relative group">
                              <input type="password" value={passwordInput} onChange={e=>setPasswordInput(e.target.value)} placeholder="PASSCODE" className="relative w-full bg-[#0a0f1a] border border-blue-500/30 text-blue-400 py-4 text-center tracking-[0.5em] focus:border-blue-500 outline-none scifi-clip font-orbitron" autoFocus />
                            </div>
                            
                            <div className="grid grid-cols-2 gap-3">
                                <button type="button" onClick={handleBack} className="py-3 border border-slate-700 hover:bg-slate-800 scifi-clip text-xs font-bold tracking-widest transition">ABORT</button>
                                <button type="submit" className="py-3 bg-blue-600/20 border border-blue-500 hover:bg-blue-600 hover:text-white text-blue-400 scifi-clip text-xs font-bold tracking-widest transition">UNLOCK</button>
                            </div>
                        </form>
                    </div>
                )}

                {/* HOME & CATEGORY VIEW */}
                {(view === 'home' || view === 'category') && (
                    <div className="animate-fade-in">
                        
                        {/* Header */}
                        <header className="mb-10 relative">
                            <div className="absolute -left-5 top-0 bottom-0 w-1 bg-blue-500 shadow-[0_0_10px_#3b82f6]"></div>
                            <div className="pl-4">
                                <div className="glitch-wrapper">
                                  <h1 className="glitch" data-text="KOSAME">KOSAME</h1>
                                </div>
                                <div className="flex items-center gap-3 mt-1">
                                  <div className="h-[2px] w-8 bg-blue-400 shadow-[0_0_5px_#60a5fa]"></div> 
                                  <h2 className="text-xs tracking-[0.25em] text-blue-400 font-bold font-orbitron">PORTFOLIO</h2>
                                </div>
                            </div>
                            {isAdmin && <div className="absolute top-0 right-0 text-[8px] text-blue-300 border border-blue-500/50 px-2 py-1 bg-blue-900/20 tracking-widest">ADMIN</div>}
                        </header>

                        {/* Category Grid (Home) */}
                        {view === 'home' && (
                            <section className="mb-10">
                                <div className="flex items-center gap-2 mb-4 text-blue-400/80">
                                    <Icon name="LayoutGrid" size={14}/>
                                    <span className="text-[9px] font-bold tracking-[0.2em]">CATEGORIES</span>
                                    <div className="h-[1px] flex-1 bg-blue-900/50 ml-2"></div>
                                </div>
                                
                                <div className="grid grid-cols-2 gap-3">
                                    {categories.map(cat => (
                                        <button key={cat.id} onClick={()=>handleCategoryClick(cat)} className={`group relative h-20 scifi-clip bg-[#0d1525] border border-slate-800 hover:border-blue-400 transition-all duration-300 text-left overflow-hidden`}>
                                            <div className="absolute inset-0 bg-gradient-to-r from-blue-500/10 to-transparent opacity-0 group-hover:opacity-100 transition duration-300"></div>
                                            <div className="absolute top-0 right-0 p-2">
                                              <div className="w-1.5 h-1.5 bg-slate-800 group-hover:bg-blue-400 transition-colors"></div>
                                            </div>
                                            <div className="relative z-10 px-3 py-3 h-full flex flex-col justify-between">
                                                <div className={`${cat.color} opacity-80 group-hover:opacity-100 group-hover:scale-110 transition-transform origin-top-left`}>
                                                  <Icon name={cat.icon} size={20}/>
                                                </div>
                                                <span className="font-orbitron font-bold text-[10px] tracking-widest text-slate-300 group-hover:text-blue-100">{cat.label}</span>
                                            </div>
                                        </button>
                                    ))}
                                </div>
                            </section>
                        )}

                        {/* Category Title (Category View) */}
                        {view === 'category' && (
                             <div className="mb-8 flex justify-between items-end border-b border-blue-900/30 pb-4">
                                <div>
                                    <button onClick={handleBack} className="flex items-center gap-2 text-slate-500 hover:text-blue-400 mb-2 text-[10px] font-bold tracking-widest transition">
                                      <Icon name="ArrowLeft" size={14}/> RETURN
                                    </button>
                                    <h2 className="text-2xl font-orbitron text-white uppercase drop-shadow-[0_0_5px_rgba(59,130,246,0.3)]">{selectedCategory?.label}</h2>
                                </div>
                                <div className="text-right">
                                  <span className="text-xl font-bold font-orbitron text-blue-500 block leading-none">{currentDisplayWorks.length}</span>
                                  <span className="text-[8px] text-slate-500 uppercase tracking-widest">Units</span>
                                </div>
                             </div>
                        )}

                        {/* Gallery Grid */}
                        <section>
                            <div className="flex justify-between items-center mb-4">
                                <h3 className="text-[9px] font-bold tracking-[0.2em] text-blue-400/70">
                                  {view === 'home' ? '/// RECENT' : '/// DATABASE'}
                                </h3>
                                <div className="w-12 h-[2px] bg-blue-900/50"></div>
                            </div>

                            {loading ? (
                                <div className="py-16 flex flex-col items-center justify-center text-blue-500 gap-4">
                                  <Icon name="Loader" className="animate-spin" size={28}/> 
                                  <span className="text-[10px] tracking-widest animate-pulse">ACCESSING...</span>
                                </div>
                            ) : (
                                <div className="grid grid-cols-3 gap-2">
                                    {currentDisplayWorks.length > 0 ? currentDisplayWorks.map((work, index) => (
                                        <div key={work.id} onClick={()=>openLightBox(index)} className="group relative aspect-square bg-[#0d1525] border border-slate-800 cursor-pointer overflow-hidden hover:border-blue-400 transition duration-300">
                                            <img src={work.img} className="w-full h-full object-cover opacity-60 group-hover:opacity-100 group-hover:scale-105 transition duration-500" loading="lazy" />
                                            <div className="absolute bottom-0 left-0 right-0 bg-black/80 backdrop-blur-sm p-1 transform translate-y-full group-hover:translate-y-0 transition duration-300">
                                                <span className="text-[7px] font-bold text-blue-400 truncate block text-center tracking-wider">{work.title}</span>
                                            </div>
                                        </div>
                                    )) : (
                                        <div className="col-span-3 text-center py-10 border border-slate-800 border-dashed text-slate-600 text-[10px] tracking-widest">NO DATA FOUND</div>
                                    )}
                                </div>
                            )}
                        </section>
                    </div>
                )}
            </div>

            {/* --- LIGHTBOX --- (ให้แสดงเต็มหน้าจอปกติ) */}
            {isLightBoxOpen && selectedImageIndex !== null && currentDisplayWorks[selectedImageIndex] && (
                <div className="fixed inset-0 z-[100] bg-[#02040a]/95 backdrop-blur-sm flex flex-col items-center justify-center animate-fade-in" onClick={closeLightBox}>
                    <div className="absolute top-0 left-0 w-full p-4 flex justify-between items-start z-20 pointer-events-none">
                        <div>
                            <p className="text-[8px] text-blue-500 tracking-[0.2em] mb-1">SYSTEM /// VIEWING</p>
                            <h3 className="text-lg font-orbitron text-white uppercase">{currentDisplayWorks[selectedImageIndex].title}</h3>
                        </div>
                        <button onClick={closeLightBox} className="pointer-events-auto p-2 border border-slate-700 hover:border-blue-500 hover:text-blue-500 text-slate-400 transition bg-black/50 scifi-clip">
                          <Icon name="X" size={20}/>
                        </button>
                    </div>

                    <div className="relative w-full max-w-lg px-2 flex items-center justify-center group" onClick={e => e.stopPropagation()}>
                        <div className="relative border border-blue-500/20 p-1 bg-blue-900/5">
                            <img src={currentDisplayWorks[selectedImageIndex].img} className="max-w-full max-h-[70vh] object-contain shadow-[0_0_30px_rgba(59,130,246,0.1)]" />
                        </div>
                    </div>
                    
                    {/* จุดนำทางสำหรับมือถือ */}
                    <div className="absolute bottom-10 w-full px-8 flex gap-1 justify-center pointer-events-none flex-wrap">
                        {currentDisplayWorks.map((_, i) => (
                            <div key={i} className={`h-1 rounded-sm transition-all duration-300 ${i === selectedImageIndex ? 'w-6 bg-blue-500' : 'w-2 bg-slate-800'}`}></div>
                        ))}
                    </div>
                </div>
            )}

            {/* --- UPLOAD MODAL (ADMIN) --- */}
            {showAddModal && (
                <div className="fixed inset-0 z-[90] flex items-center justify-center p-4 bg-black/80 backdrop-blur-md">
                    <div className="bg-[#0a0f1a] border border-blue-500/30 w-full max-w-sm scifi-clip shadow-[0_0_50px_rgba(59,130,246,0.1)] animate-fade-in relative">
                        <div className="h-1 w-full bg-gradient-to-r from-blue-600 to-transparent"></div>
                        <div className="p-4 flex justify-between items-center">
                            <h4 className="text-[11px] font-orbitron tracking-widest text-blue-400">UPLOAD_INTERFACE</h4>
                            <button onClick={()=>setShowAddModal(false)} className="text-slate-500 hover:text-white"><Icon name="X" size={16}/></button>
                        </div>
                        <form onSubmit={handleAddWork} className="p-5 pt-0 space-y-4">
                            <div>
                                <label className="text-[8px] text-slate-500 tracking-widest block mb-1">FILE TITLE</label>
                                <input type="text" value={newWork.title} onChange={e=>setNewWork({...newWork, title: e.target.value})} className="w-full bg-[#05080f] border border-slate-700 focus:border-blue-500 rounded-none p-3 text-xs text-white outline-none"/>
                            </div>
                            <div>
                                <label className="text-[8px] text-slate-500 tracking-widest block mb-1">CATEGORY CLASS</label>
                                <select value={newWork.category} onChange={e=>setNewWork({...newWork, category: e.target.value})} className="w-full bg-[#05080f] border border-slate-700 focus:border-blue-500 rounded-none p-3 text-xs text-white outline-none">
                                    {categories.map(c => <option key={c.id} value={c.id}>{c.label}</option>)}
                                </select>
                            </div>
                            <div className="border border-dashed border-slate-700 p-4 hover:border-blue-500 transition cursor-pointer relative">
                                <input type="file" onChange={e=>setFile(e.target.files[0])} accept="image/*" className="absolute inset-0 opacity-0 w-full h-full cursor-pointer"/>
                                <div className="text-center">
                                    <Icon name="Upload" size={20} className="mx-auto text-slate-500 mb-2"/>
                                    <p className="text-[9px] text-blue-500 tracking-widest truncate px-2">{file ? file.name : "SELECT OR DROP FILE"}</p>
                                </div>
                            </div>
                            <button type="submit" disabled={isUploading} className="w-full py-3 bg-blue-600/20 border border-blue-500 text-blue-400 hover:bg-blue-500 hover:text-white font-bold text-[10px] tracking-[0.2em] transition disabled:opacity-50">
                                {isUploading ? "TRANSMITTING..." : "INITIATE UPLOAD"}
                            </button>
                        </form>
                    </div>
                </div>
            )}

            {/* FOOTER NAV - ผูกติดกับกรอบมือถือ (max-w-[430px]) และจัดให้อยู่ตรงกลางด้วย left-1/2 -translate-x-1/2 */}
            <footer className="fixed bottom-0 w-full max-w-[430px] p-4 z-50 pointer-events-none left-1/2 -translate-x-1/2">
                <div className="w-full bg-[#0a0f1a]/90 backdrop-blur border-t border-blue-500/30 px-8 py-3 scifi-clip flex justify-between items-center shadow-2xl pointer-events-auto relative">
                    <div className="absolute bottom-0 left-0 w-full h-[1px] bg-gradient-to-r from-transparent via-blue-500/50 to-transparent"></div>
                    <button onClick={handleBack} className={`flex flex-col items-center gap-1 group ${view==='home'?'text-blue-400':'text-slate-600'}`}>
                        <div className={`w-1 h-1 rounded-full ${view==='home'?'bg-blue-400 shadow-[0_0_5px_#60a5fa]':'bg-slate-700'}`}></div>
                        <span className="text-[8px] font-bold tracking-widest group-hover:text-blue-300">HOME</span>
                    </button>
                    <button onClick={()=>isAdmin && setShowAddModal(true)} disabled={!isAdmin} className={`transform -translate-y-5 bg-[#02040a] text-blue-400 p-2.5 rounded-lg border border-blue-500/50 shadow-[0_0_15px_rgba(59,130,246,0.3)] ${!isAdmin && 'grayscale opacity-20 border-slate-700'}`}>
                        <Icon name="Plus" size={24}/>
                    </button>
                    <button onClick={()=>isAdmin ? setIsAdmin(false) : setView('login')} className={`flex flex-col items-center gap-1 group ${isAdmin?'text-blue-400':'text-slate-600'}`}>
                        <Icon name={isAdmin ? "Unlock" : "Lock"} size={12} className="mt-1"/>
                        <span className="text-[8px] font-bold tracking-widest group-hover:text-blue-300">ADMIN</span>
                    </button>
                </div>
            </footer>

        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
